<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>arXiv Daily Papers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <h1 class="logo">arXiv<span class="logo-accent">Daily</span></h1>
      </div>
      <div class="header-center">
        <div class="date-nav">
          <button class="date-btn date-prev" id="prevDate" title="Previous day">&larr;</button>
          <select class="date-select" id="dateSelect"></select>
          <button class="date-btn date-next" id="nextDate" title="Next day">&rarr;</button>
        </div>
      </div>
      <div class="header-right">
        <button class="settings-btn" id="settingsBtn" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </header>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
      <div class="modal">
        <div class="modal-header">
          <h2>LLM Settings</h2>
          <button class="modal-close" id="settingsClose">&times;</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>Mode</label>
            <div class="radio-group">
              <label class="radio-label">
                <input type="radio" name="llmMode" value="server" checked> Server (use server API key)
              </label>
              <label class="radio-label">
                <input type="radio" name="llmMode" value="client"> Client (use your own key)
              </label>
            </div>
          </div>
          <div id="serverSettings" class="server-settings">
            <div class="form-group">
              <label for="serverPassword">Server Password</label>
              <input type="password" id="serverPassword" placeholder="Enter server password">
              <div class="form-hint" id="serverHint"></div>
            </div>
          </div>
          <div id="clientSettings" class="client-settings hidden">
            <div class="form-group">
              <label for="apiKey">API Key</label>
              <input type="password" id="apiKey" placeholder="sk-...">
            </div>
            <div class="form-group">
              <label for="apiBase">API Base URL</label>
              <input type="text" id="apiBase" placeholder="https://api.openai.com/v1">
            </div>
            <div class="form-group">
              <label for="modelName">Model</label>
              <input type="text" id="modelName" placeholder="gpt-4o">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-save" id="settingsSave">Save</button>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <main class="main">
      <!-- Paper List -->
      <section class="paper-list-section" id="paperListSection">
        <div class="section-toolbar">
          <div class="paper-count" id="paperCount">-- papers</div>
          <div class="add-paper">
            <input type="text" class="add-paper-input" id="newPaperInput" placeholder="Add paper: arXiv ID or URL">
            <button class="add-paper-btn" id="newPaperBtn">+</button>
          </div>
        </div>
        <div class="paper-list" id="paperList">
          <div class="loading-state" id="loadingState">
            <div class="loader"></div>
            <p>Loading papers...</p>
          </div>
          <div class="empty-state hidden" id="emptyState">
            <div class="empty-icon">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            </div>
            <p>No papers available for this date.</p>
          </div>
        </div>
      </section>

      <!-- Detail Panel -->
      <aside class="detail-panel" id="detailPanel">
        <div class="detail-placeholder" id="detailPlaceholder">
          <div class="placeholder-icon">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          </div>
          <p>Select a paper to view details</p>
        </div>
        <div class="detail-content hidden" id="detailContent">
          <button class="detail-close" id="detailClose">&times;</button>
          <div class="detail-header">
            <h2 class="detail-title" id="detailTitle"></h2>
            <div class="detail-meta">
              <div class="detail-authors" id="detailAuthors"></div>
              <div class="detail-affiliations" id="detailAffiliations"></div>
              <div class="detail-links" id="detailLinks"></div>
            </div>
          </div>
          <div class="detail-stars" id="detailStars"></div>
          <div class="detail-tldr" id="detailTldr"></div>

          <!-- Chat Section -->
          <div class="chat-section">
            <div class="chat-divider">
              <span>LLM Conversation</span>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
              <textarea class="chat-input" id="chatInput" placeholder="Ask about this paper..." rows="2"></textarea>
              <button class="chat-send" id="chatSend">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              </button>
            </div>
          </div>
        </div>
      </aside>
    </main>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
